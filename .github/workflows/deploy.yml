name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Build & Test (required before deploy) ────────────────────────────────
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,wasm32v1-none

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build marketplace registry WASM (required by contractimport!)
        working-directory: contracts
        run: cargo build --target wasm32v1-none --release --package lumenlock-marketplace-registry

      - name: Run contract tests
        working-directory: contracts
        run: cargo test --all

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --run
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_MARKETPLACE_REGISTRY_CONTRACT_ID: ${{ vars.TESTNET_REGISTRY_CONTRACT_ID || 'CTEST000000000000000000000000000000000000000000000000001' }}
          NEXT_PUBLIC_ESCROW_VAULT_CONTRACT_ID: ${{ vars.TESTNET_VAULT_CONTRACT_ID || 'CTEST000000000000000000000000000000000000000000000000002' }}

  # ─── Build WASM Artifacts ─────────────────────────────────────────────────
  build-contracts:
    name: Build Contract Artifacts
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Stellar CLI
        uses: stellar/stellar-cli@v22.0.1

      - name: Build WASM
        working-directory: contracts
        run: |
          cargo build --target wasm32v1-none --release --package lumenlock-marketplace-registry
          cargo build --target wasm32v1-none --release
          ls -la target/wasm32v1-none/release/*.wasm

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-artifacts-${{ github.sha }}
          path: contracts/target/wasm32v1-none/release/*.wasm
          retention-days: 30

  # ─── Build Frontend ────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build Next.js
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: ${{ vars.STELLAR_NETWORK || 'testnet' }}
          NEXT_PUBLIC_STELLAR_RPC_URL: ${{ vars.STELLAR_RPC_URL || 'https://soroban-testnet.stellar.org' }}
          NEXT_PUBLIC_STELLAR_HORIZON_URL: ${{ vars.STELLAR_HORIZON_URL || 'https://horizon-testnet.stellar.org' }}
          NEXT_PUBLIC_NETWORK_PASSPHRASE: ${{ vars.NETWORK_PASSPHRASE || 'Test SDF Network ; September 2015' }}
          NEXT_PUBLIC_MARKETPLACE_REGISTRY_CONTRACT_ID: ${{ vars.TESTNET_REGISTRY_CONTRACT_ID }}
          NEXT_PUBLIC_ESCROW_VAULT_CONTRACT_ID: ${{ vars.TESTNET_VAULT_CONTRACT_ID }}
          NEXT_PUBLIC_APP_URL: ${{ vars.APP_URL || 'https://lumenlock.dev' }}
          NEXT_PUBLIC_EXPLORER_URL: ${{ vars.EXPLORER_URL || 'https://stellar.expert/explorer/testnet' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-${{ github.sha }}
          path: frontend/.next/
          retention-days: 7

  # ─── Create GitHub Release ────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-contracts, build-frontend]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-artifacts-${{ github.sha }}
          path: release-artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release-artifacts/*.wasm
          generate_release_notes: true
