name: PR Checks

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Smart Contract Tests ──────────────────────────────────────────────────
  contract-lint:
    name: Contract Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        working-directory: contracts
        run: cargo fmt --all -- --check

      - name: Clippy lint
        working-directory: contracts
        run: cargo clippy --all-targets --all-features -- -D warnings

  contract-test:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: contract-lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run contract unit tests
        working-directory: contracts
        run: cargo test --all -- --nocapture

      - name: Build WASM artifacts
        working-directory: contracts
        run: |
          cargo build --target wasm32-unknown-unknown --release
          ls -la target/wasm32-unknown-unknown/release/*.wasm

  # ─── Frontend Tests ────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: frontend
        run: npm run lint

  frontend-test:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Vitest tests
        working-directory: frontend
        run: npm test -- --run --reporter=verbose
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_STELLAR_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_MARKETPLACE_REGISTRY_CONTRACT_ID: CTEST000000000000000000000000000000000000000000000000001
          NEXT_PUBLIC_ESCROW_VAULT_CONTRACT_ID: CTEST000000000000000000000000000000000000000000000000002

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/

  # ─── Security Audit ────────────────────────────────────────────────────────
  security-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Audit Rust dependencies
        working-directory: contracts
        run: cargo audit

      - name: Audit npm dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

  # ─── Build Check ───────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js application
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_STELLAR_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          NEXT_PUBLIC_MARKETPLACE_REGISTRY_CONTRACT_ID: CTEST000000000000000000000000000000000000000000000000001
          NEXT_PUBLIC_ESCROW_VAULT_CONTRACT_ID: CTEST000000000000000000000000000000000000000000000000002
          NEXT_PUBLIC_APP_URL: https://lumenlock.dev
          NEXT_PUBLIC_EXPLORER_URL: https://stellar.expert/explorer/testnet
